<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Samkran</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: var(--primary-green);
            line-height: 1;
        }
        .error-message {
            font-size: 2rem;
            color: var(--text-dark);
            margin-bottom: 1rem;
        }
        .error-description {
            color: var(--text-gray);
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div>
            <div class="error-code">404</div>
            <h1 class="error-message">Page Not Found</h1>
            <p class="error-description">The page you're looking for doesn't exist or has been moved.</p>
            <a href="/" class="btn btn-primary">Go Back Home</a>
        </div>
    </div>
</body>
</html>
